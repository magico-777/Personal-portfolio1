<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Ahmed Amr Mohamed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; transition: 0.4s; background: var(--bs-body-bg); }
        .contact-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 80px 0;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }
        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
        }
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
            border: 1px solid transparent;
        }
        .info-item:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: #00d2ff;
            transform: translateX(10px);
        }
        .icon-circle {
            width: 50px;
            height: 50px;
            background: #00d2ff;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            font-size: 1.2rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0,0,0,0.1);
        }
        [data-bs-theme="dark"] .form-control { color: white; border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top bg-body-tertiary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">AMR<span class="text-primary">.</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="contact-header text-center">
        <div class="container">
            <h1 class="display-3 fw-bold">Get In Touch</h1>
            <p class="lead">Have a project in mind? Let's build something amazing together.</p>
        </div>
    </header>

    <section class="container my-5 py-5">
        <div class="row g-5">
            <div class="col-lg-5">
                <h2 class="fw-bold mb-4">Contact Information</h2>
                
                <a href="https://wa.me/201555902611" target="_blank" class="info-item shadow-sm">
                    <div class="icon-circle bg-success"><i class="bi bi-whatsapp"></i></div>
                    <div>
                        <h6 class="mb-0 fw-bold">WhatsApp</h6>
                        <span>+20 155 590 2611</span>
                    </div>
                </a>

                <a href="mailto:magico01555@gmail.com" class="info-item shadow-sm">
                    <div class="icon-circle bg-danger"><i class="bi bi-envelope"></i></div>
                    <div>
                        <h6 class="mb-0 fw-bold">Email</h6>
                        <span>magico01555@gmail.com</span>
                    </div>
                </a>

                <div class="info-item shadow-sm">
                    <div class="icon-circle bg-primary"><i class="bi bi-geo-alt"></i></div>
                    <div>
                        <h6 class="mb-0 fw-bold">Location</h6>
                        <span>Giza, Egypt</span>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="contact-card shadow-lg">
                    <form id="contact-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Your Name</label>
                                <input type="text" name="user_name" class="form-control" placeholder="Ahmed Amr" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Your Email</label>
                                <input type="email" name="user_email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Subject</label>
                                <input type="text" name="subject" class="form-control" placeholder="Project Inquiry" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Message</label>
                                <textarea name="message" class="form-control" rows="5" placeholder="Tell me about your project..." required></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" id="submit-btn" class="btn btn-primary btn-lg w-100 rounded-pill mt-3">
                                    <i class="bi bi-send-fill me-2"></i> Send Message
                                </button>
                            </div>
                        </div>
                    </form>
                    <div id="response-msg" class="mt-3 text-center fw-bold"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY"); 
        })();

        const contactForm = document.getElementById('contact-form');
        const responseMsg = document.getElementById('response-msg');

        contactForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = "Sending...";
            btn.disabled = true;

           
            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(function() {
                    responseMsg.innerHTML = "✅ Message Sent Successfully!";
                    responseMsg.className = "mt-3 text-center text-success fw-bold";
                    contactForm.reset();
                    btn.innerHTML = "Send Message";
                    btn.disabled = false;
                }, function(error) {
                    responseMsg.innerHTML = "❌ Failed to send. Please try again.";
                    responseMsg.className = "mt-3 text-center text-danger fw-bold";
                    btn.innerHTML = "Send Message";
                    btn.disabled = false;
                    console.log('FAILED...', error);
                });
        });

     
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</body>
</html>
